<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>دعوة - Karas Chat</title>
  <script src="https://cdn.socket.io/4.7.0/socket.io.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #075e54; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
    .card { background: #fff; padding: 32px; border-radius: 12px; max-width: 400px; width: 100%; text-align: center; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
    .card h1 { color: #075e54; margin-bottom: 16px; font-size: 24px; }
    .card p { color: #666; margin-bottom: 24px; line-height: 1.6; }
    .card input { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; }
    .card button { width: 100%; padding: 14px; background: #25d366; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
    .card button:hover { background: #20bd5a; }
    .card .err { color: #d32f2f; font-size: 14px; margin-top: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="title">دعوة للانضمام</h1>
    <p id="subtitle">جاري التحقق من الرابط...</p>
    <div id="form" style="display:none">
      <p id="inviterMsg" style="margin-bottom:16px"></p>
      <input type="text" id="phone" placeholder="رقم الموبايل" maxlength="15">
      <button onclick="doLogin()">دخول / تسجيل</button>
      <p class="err" id="err"></p>
    </div>
    <div id="invalid" style="display:none">
      <p id="invalidMsg" style="color:#d32f2f"></p>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    const token = params.get('token');
    const API = location.origin;

    async function verify() {
      if (!token) {
        document.getElementById('subtitle').style.display = 'none';
        document.getElementById('invalid').style.display = 'block';
        document.getElementById('invalidMsg').textContent = 'رابط غير صالح';
        return;
      }
      try {
        const res = await fetch(API + '/api/invites/verify/' + token);
        const data = await res.json();
        if (data.valid) {
          document.getElementById('subtitle').style.display = 'none';
          document.getElementById('inviterMsg').textContent = 'تمت دعوتك من: ' + (data.inviterName || 'مستخدم');
          document.getElementById('form').style.display = 'block';
        } else {
          document.getElementById('subtitle').style.display = 'none';
          document.getElementById('invalid').style.display = 'block';
          document.getElementById('invalidMsg').textContent = data.message || 'رابط غير صالح';
        }
      } catch (e) {
        document.getElementById('subtitle').style.display = 'none';
        document.getElementById('invalid').style.display = 'block';
        document.getElementById('invalidMsg').textContent = 'فشل التحقق';
      }
    }

    async function doLogin() {
      const phone = document.getElementById('phone').value.trim();
      document.getElementById('err').textContent = '';
      if (!phone) { document.getElementById('err').textContent = 'أدخل الرقم'; return; }
      try {
        const res = await fetch(API + '/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, inviteToken: token })
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('chat_token', data.data.token);
          localStorage.setItem('chat_user', JSON.stringify(data.data.user));
          location.href = '/';
        } else {
          const msg = data.needsApproval ? 'حسابك بانتظار موافقة الأدمن. تواصل مع الأدمن للموافقة.' : (data.message || 'فشل');
          document.getElementById('err').textContent = msg;
        }
      } catch (e) {
        document.getElementById('err').textContent = 'خطأ في الاتصال';
      }
    }

    verify();
  </script>
</body>
</html>
